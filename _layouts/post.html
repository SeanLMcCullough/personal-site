---
layout: section
# Layout for individual posts (blog, project, talk)
---
<article class="post-article">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</p>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
